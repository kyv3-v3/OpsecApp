name: Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute release version
        id: version
        run: |
          VERSION_NAME="1.0.${GITHUB_RUN_NUMBER}"
          VERSION_CODE="${GITHUB_RUN_NUMBER}"
          TAG_NAME="v${VERSION_NAME}"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Detect signing mode
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_STORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "mode=signed" >> "$GITHUB_OUTPUT"
            echo "Signing mode: signed"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "mode=unsigned" >> "$GITHUB_OUTPUT"
            echo "Signing secrets missing or incomplete: building unsigned release APK."
          fi

      - name: Prepare keystore
        if: ${{ steps.signing.outputs.enabled == 'true' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.signing.outputs.enabled == 'true' && format('{0}/release.keystore', runner.temp) || '' }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          APP_VERSION_NAME: ${{ steps.version.outputs.version_name }}
          APP_VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Prepare release assets
        id: assets
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            APK_PATH="app/build/outputs/apk/release/app-release-unsigned.apk"
          fi
          if [ ! -f "$APK_PATH" ]; then
            APK_PATH=$(ls -1 app/build/outputs/apk/release/*.apk 2>/dev/null | head -n 1 || true)
          fi
          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "APK not found."
            ls -la app/build/outputs/apk/release || true
            exit 1
          fi
          VERSION="${{ steps.version.outputs.version_name }}"
          RELEASE_APK="OpsecApp-${VERSION}.apk"
          cp "$APK_PATH" "$GITHUB_WORKSPACE/$RELEASE_APK"
          echo "apk_name=$RELEASE_APK" >> "$GITHUB_OUTPUT"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ steps.assets.outputs.apk_name }}
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.tag_name }}
          files: ${{ steps.assets.outputs.apk_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
